<!DOCTYPE html>
<html>
<head>
<title>Shapes</title>

<style>
body {
  background-color: white;
}

container {
  position: relative;
  width: 300px;
  height: 300px;
  border: 1px solid black; 
}

/* 矩形 */
rectangle {
  width: 200px;
  height: 200px;
  background-color: blue;
  position: absolute;
  top: 50px;
  left: 20px;
}

/* 圓形 */
circle {
  width: 150px;
  height: 150px;
  background-color: yellow;
  border-radius: 50%;
  position: absolute;
  top: 80px;
  left: 120px;
  border: 5px solid red;
}
</style>

</head>

<body>

<h2>Shapes</h2>

<div class="container">
  <div class="rectangle"></div>
  <div class="circle"></div>
</div>

</body>
</html>
